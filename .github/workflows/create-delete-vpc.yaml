name: Create or Delete VPC

on:
  workflow_dispatch:
    inputs:
      resource:
        type: choice
        options: [vpc, ec2]
      action:
        type: choice
        options: [create, delete]
jobs:
    vpc:
        runs-on: ubuntu-latest

        permissions:
          id-token: write
          contents: read

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              
            - name: Debug Role ARN
              run: echo "${{ secrets.AWS_ROLE_ARN }}"

            - name: Debug GitHub Context
              run: |
                echo "REPO: $GITHUB_REPOSITORY"
                echo "REF: $GITHUB_REF"
                
            - name: Install Terraform
              uses: hashicorp/setup-terraform@v3

            - name: Install Terragrunt
              run: |
                wget -O terragrunt https://github.com/gruntwork-io/terragrunt/releases/latest/download/terragrunt_linux_amd64
                chmod +x terragrunt
                sudo mv terragrunt /usr/local/bin/

            - name: Configure AWS Credentials
              uses: aws-actions/configure-aws-credentials@v4
              with: 
                role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
                aws-region: ap-southeast-1
                
            - name: Execute Terragrunt
              run: |
                RESOURCE="${{ github.event.inputs.resource }}"
                ACTION="${{ github.event.inputs.action }}"

                if [[ "$RESOURCE" == "vpc" && "$ACTION" == "create" ]]; then
                  cd values/vpc
                  terragrunt apply -auto-approve

                elif [[ "$RESOURCE" == "ec2" && "$ACTION" == "create" ]]; then
                  cd values
                  terragrunt run --all apply -- -auto-approve

                elif [[ "$RESOURCE" == "ec2" && "$ACTION" == "delete" ]]; then
                  cd values/ec2
                  terragrunt destroy -auto-approve

                elif [[ "$RESOURCE" == "vpc" && "$ACTION" == "delete" ]]; then
                  cd values
                  terragrunt run --all destroy -- -auto-approve

                fi
