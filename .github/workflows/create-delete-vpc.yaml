name: Manage Infrastructure

on:
  workflow_dispatch:
    inputs:
      resource:
        type: choice
        options: [vpc, ec2]
      action:
        type: choice
        options: [create, delete]
      workspace_ebs_name:
        description: "(EC2 only) Override workspace EBS name tag. Leave empty to use the default"
        type: string
        required: false
        default: ""
      destroy_ebs:
        description: "(EC2 delete only) Also destroy the workspace EBS volume (permanent data loss). Default: false keeps the volume."
        type: boolean
        required: false
        default: false

jobs:
  manage:
    runs-on: aws-736052310305
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: check version
        run: |
          export PATH="/config/.tfenv/bin:$PATH"

          tfenv use latest
          terraform --version
          terragrunt --version

      - name: Execute Terragrunt
        shell: bash
        run: |
          export PATH="/config/.tfenv/bin:$PATH"
          tfenv use latest
          
          RESOURCE="${{ github.event.inputs.resource }}"
          ACTION="${{ github.event.inputs.action }}"
          EBS_NAME="${{ github.event.inputs.workspace_ebs_name }}"

          # Override workspace EBS name if explicitly provided
          EBS_VAR=""
          if [[ -n "$EBS_NAME" ]]; then
            EBS_VAR="-var=workspace_ebs_name=$EBS_NAME"
          fi

          if [[ "$RESOURCE" == "vpc" && "$ACTION" == "create" ]]; then
            cd values/vpc
            terragrunt apply -auto-approve

          elif [[ "$RESOURCE" == "ec2" && "$ACTION" == "create" ]]; then
            # Dependency order: vpc -> alb -> ec2
            cd values/vpc
            terragrunt apply -auto-approve
            cd ../alb
            terragrunt apply -auto-approve
            cd ../ec2
            terragrunt apply -auto-approve $EBS_VAR

          elif [[ "$RESOURCE" == "ec2" && "$ACTION" == "delete" ]]; then
            # Destroy in reverse dependency order: ec2 -> alb
            cd values/ec2
            if [[ "${{ github.event.inputs.destroy_ebs }}" == "true" ]]; then
              # Full teardown including workspace EBS.
              # prevent_destroy must be patched locally (CI workspace is ephemeral — repo is not modified).
              sed -i 's/prevent_destroy = true/prevent_destroy = false/' ../../stack/ec2/main.tf
              terragrunt destroy -auto-approve
            else
              # Keep the workspace EBS — only destroy compute/networking resources.
              # Using -target means Terraform never plans to destroy the EBS,
              # so prevent_destroy is never triggered.
              terragrunt destroy -auto-approve \
                -target=aws_autoscaling_group.main \
                -target=aws_launch_template.ec2_launch_template \
                -target=aws_security_group.ec2_sg \
                -target=aws_iam_instance_profile.ec2_profile \
                -target=aws_iam_role_policy.ec2_ssm_read \
                -target='aws_iam_role_policy.ec2_ebs_attach[0]' \
                -target=aws_iam_role.ec2_role
            fi
            cd ../alb
            terragrunt destroy --terragrunt-non-interactive -auto-approve

          elif [[ "$RESOURCE" == "vpc" && "$ACTION" == "delete" ]]; then
            # Full teardown — always removes workspace EBS too.
            # Patch prevent_destroy so Terraform does not block the destroy plan.
            # The CI workspace is ephemeral; the repo file is not modified.
            sed -i 's/prevent_destroy = true/prevent_destroy = false/' stack/ec2/main.tf
            cd values/ec2
            terragrunt destroy -auto-approve
            cd ../alb
            terragrunt destroy --terragrunt-non-interactive -auto-approve
            cd ../vpc
            terragrunt destroy --terragrunt-non-interactive -auto-approve

          fi